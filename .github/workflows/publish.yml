# Publishes the library to GitHub Packages when you publish a GitHub Release,
# or manually via workflow_dispatch (default branch).
#
# Consumers add GitHub Packages as a Maven repository, for example:
#   <repositories>
#     <repository>
#       <id>github</id>
#       <url>https://maven.pkg.github.com/OWNER/REPO</url>
#     </repository>
#   </repositories>
# and authenticate (token with read:packages). See GitHub’s “Apache Maven registry”.
#
# For Maven Central, use local `mvn deploy` with your Sonatype credentials
# and signing (see publish.md); do not rely on this workflow alone.

name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  github-packages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: "maven"
          server-id: github
          server-username: ${{ github.actor }}
          server-password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to GitHub Packages
        run: |
          mvn -B -ntp deploy \
            -DaltDeploymentRepository=github::default::https://maven.pkg.github.com/${{ github.repository }}
